<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Seva - Interactive Map</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #map { height: calc(100vh - 70px); width: 100%; }
        .map-overlay {
            position: absolute;
            top: 90px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            z-index: 500;
            max-width: 250px;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-city"></i>
                <span>Civic Seva</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="report.html">Report Issue</a>
                <a href="map.html" class="active">Map</a>
                <a href="dashboard.html">Dashboard</a>
            </nav>
            <div class="nav-actions">
                <div id="navPoints" class="points-badge" style="display:none;">
                    <i class="fas fa-coins text-gold"></i>
                    <span id="userPointsDisplay">0</span>
                </div>
            </div>
        </div>
    </header>

    <div id="map"></div>
    
    <div class="map-overlay">
        <h3>Live Map</h3>
        <p style="font-size: 0.85rem; color: var(--secondary);">Showing issues reported in real-time across the city.</p>
    </div>

    <!-- Details injected logic from script.js will handle marker clicks -->
    
    <script src="script.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
</body>

</html>
